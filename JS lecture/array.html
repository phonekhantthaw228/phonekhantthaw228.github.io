    <h1>Array</h1>
    <script>
        //    array

let studentList=['Ba Mg', 'Pkt', 'koko', 'Hla Hla', 'Hsu Hsu'];
console.log(studentList);
console.log(studentList.length);
console.log(studentList[4]);

studentList.push('Sandy');

studentList.pop();

// array.shift();       delete the first index 

studentList.shift();

// array. sort();

studentList.sort();

studentList2.sort().reverse();

// string to array

studentListArray = studentList3.split(',');
console.log(studentListArray);
let array1=[1,2,3,4];
