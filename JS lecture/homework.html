<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication</title>
</head>
<body>
    <h1>Multiply what you feel like !!</h1>

    <script>


let num = prompt('Enter the number for which you the multiplication to 12 units');



 for(let i = 0 ; i < 12 ; i++){
let result = num * (i+1) ;
  document.write(` ${num} * ${i+1} = ${result} <br>`);
    
 } 


 
    </script>
</body>
</html>
