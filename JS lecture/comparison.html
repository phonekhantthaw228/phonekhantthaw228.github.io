<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Comparison Lessons</h1>
    <script>
        //Comparison  greater than >
        let num1= 1234345;
        let num2= 1234523;
        console.log(num1>num2); // true or false


        // greater than or equalto operator >=
       
        console.log(num2 >= num1);

        // less than  operator <

        console.log(num1<num2);

        // less than or equal to operator <=

        console.log(num2<=num1);


        // equal to operator == onlye value
        let num3='1234';
        let num4=1234;

        console.log (num3==num4);

        // triple equal to ==== to test whether the data type and the value are the same

        console.log( num3===num4);


        // not equal operator !=  only value
        
        console.log(num1!=num2);

        // not equal operator !== data type and value

        console.log(num3!==num4);
    </script>
</body>
</html>
