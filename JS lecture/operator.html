<body>
   <h1>Operator</h1>
   <script>

    // assign operator =
    let name = "Azelia Sandy";
    console.log(name);

    // addition operator +
    let number = 4 + 5 ;
    console.log(number);
    let fourFive = '4' + 5 ;
    console.log(fourFive);

    let number1 = 20000;
    let number2 = 30000;
    let number3 = number1+number2;

    console.log(number3)

    let num= 10;
    // num= num+ 5;
    num += 5;
    console.log(num);


    let numOne= 10 ;
    //  numOne ++;
    console.log(numOne++);
    console.log(numOne);

    // multiplication operator *
    let num4 = 23423452345;
    // num4 *= 2145234;
    num4 = num4 *123452134;
    console.log(num4);
 

    // division operator /
    let num5 = 10 ;
    num5 = num5 / 2;
    console.log(num5);

    // remainder operator %
    let num6 = 345234523;
    num6 = num6 % 23452345;
    console.log(num6);

    //exponent operator**
     const num7 = 2;
     const  num8 =6;
     const num9 = num7 ** num8 ;
     console.log (num9);

     // presendence operator
     let result = (4+5) -2 * 5 / 2 % 3 ;
     console.log(result);
   </script>
