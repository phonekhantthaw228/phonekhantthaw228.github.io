    <script>
    // string data type
    // let name = " Angus";
    // let name = ' Angus ';
    let name =` Angus`;
    console .log (name);
    console .log ( typeof(name));


    // numberic data type
    let age = 25;
    console .log(age);
    console .log( typeof(age));

    // boolean data type (true or false)
     let isStudent = true;
     console .log (isStudent);
     console .log (typeof(isStudent));

     // undefined data type
     let undefinedVariable;
     console . log (undefinedVariable);
     console . log ( typeof( undefinedVariable));

     //null data type
     let nullVariable = null;
     console .log ( nullVariable);
     console.log (typeof(nullVariable));

     // array data type index start from 0
     // let studentList = new Array ( 'Mg Mg ', 'Ag Ag', 'Hla Hla');
    let studentList = ['Hsu Hsu', 'Mg Mg', 'Kyaw Kyaw']

    console .log (studentList);
    console .log (typeof(studentList));
    console.log ( studentList.length);
    console.log (studentList[2]);

    // object data type
    let student = {
        // key : value
        name : "Angus Mingati Burkman" ,
        age :25,
        address : "Oxford",
        education : " Oxford Medical School",


    }

    console.log(student);
    console.log(typeof(student));
    console.log(student.address);



</script>
