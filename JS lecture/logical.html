    <h1>Logical Lesson</h1>

    <script>
        // Or operator || 
        let num1= 10;
        let num2= 20;

        console.log(num1<num2 || num1==num2); // true || false. ==> true


            // AND operator &&
            console.log( num2 < num1 && num1 == num2 ); // true && false ==> false

            //NOT operator !
            let num3= 10;

                                 console.log( !num3); // false
    </script>
